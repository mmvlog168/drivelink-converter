<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DriveLink Converter</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231a73e8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71'></path><path d='M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71'></path></svg>">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* 改為現代感十足的淡灰藍線性漸層 */
            background: linear-gradient(135deg, #eef2f7 0%, #dfe7f0 100%);
            color: #202124;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 核心改動：懸浮大圓角卡片 */
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 680px;
            /* 改為 40px 大圓角 */
            border-radius: 40px;
            padding: 64px 48px;
            /* 柔和的擴散陰影，創造懸浮感 */
            box-shadow: 0 20px 60px rgba(0,0,0,0.06);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .lang-switch { text-align: right; margin-bottom: 24px; margin-top: -30px; }
        .lang-btn {
            background: transparent; border: none; font-size: 13px; padding: 6px 14px;
            margin-left: 4px; cursor: pointer; border-radius: 20px; color: #adb5bd; 
            font-weight: 500; transition: all 0.2s;
        }
        .lang-btn.active { background: #f1f3f4; color: #1a73e8; }

        header { text-align: center; margin-bottom: 48px; }
        h1 {
            font-size: 38px; /* 標題微調大一點 */
            font-weight: 700; /* 字重加強 */
            color: #1a1b1e;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }
        /* 增加一行現代風標題下的裝飾文字 */
        .sub-tagline { font-size: 16px; color: #5f6368; font-weight: 400; }

        .input-group { margin-top: 32px; }
        label { display: block; font-size: 14px; color: #3c4043; margin-bottom: 12px; font-weight: 600; }
        
        /* 改為截圖中那種淡灰色、內凹感的輸入框 */
        .url-input {
            width: 100%; padding: 20px 24px; font-size: 15px; 
            border: 2px solid #f1f3f4; border-radius: 16px;
            transition: all 0.3s ease; background: #f8f9fa;
        }
        .url-input:focus { outline: none; border-color: #1a73e8; background: #fff; box-shadow: 0 0 0 4px rgba(26,115,232,0.05); }

        /* 改為圓潤的大型轉換按鈕 */
        .convert-btn {
            width: 100%;
            background: #1a73e8; color: white; border: none; 
            padding: 18px; font-size: 17px; font-weight: 700; 
            border-radius: 16px; cursor: pointer; margin-top: 24px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(26,115,232,0.2);
        }
        .convert-btn:hover { background: #1557b0; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(26,115,232,0.3); }
        .convert-btn:active { transform: translateY(1px); }

        /* 結果區域美化 */
        .result-area { 
            background: #f8f9fa; border-radius: 24px; padding: 28px; margin-top: 40px; 
            display: none; border: 1px solid rgba(0,0,0,0.02);
            animation: slideUp 0.4s ease-out;
        }
        .result-label { font-size: 12px; font-weight: 800; color: #1a73e8; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .result-url { 
            background: white; padding: 18px; border-radius: 14px; word-break: break-all; 
            font-family: 'SF Mono', 'Roboto Mono', monospace; font-size: 13px; margin-bottom: 20px; border: 1px solid #e8eaed; 
            line-height: 1.5; color: #444;
        }
        
        .copy-btn {
            width: 100%; background: #202124; color: white; border: none; 
            padding: 14px; border-radius: 12px; font-weight: 700; 
            cursor: pointer; font-size: 14px; transition: all 0.2s ease;
        }
        .copy-btn:hover { background: #333; }
        
        /* 成功樣式保留 */
        .copy-btn.success {
            background: #1e8e3e;
            color: white;
            border-color: #1e8e3e;
        }

        /* 提示區域圓角化 */
        .tip { margin-top: 48px; padding: 24px; background: #f1f3f4; border-radius: 24px; font-size: 13px; color: #70757a; line-height: 1.6; }
        .footer { text-align: center; margin-top: 40px; font-size: 11px; color: #bdc1c6; letter-spacing: 1px; font-weight: 600; }
        .error-msg { color: #d93025; text-align: center; margin-top: 16px; font-size: 13px; font-weight: 600; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="lang-switch">
        <button class="lang-btn" onclick="setLanguage('zh')">中文</button>
        <button class="lang-btn active" onclick="setLanguage('en')">English</button>
    </div>

    <header>
        <h1 id="mainTitle">DriveLink Converter</h1>
        <div id="subTagline" class="sub-tagline">Pure, efficient, and direct.</div>
    </header>

    <div class="input-group">
        <label id="inputLabel">Share Link</label>
        <input type="text" id="urlInput" class="url-input" spellcheck="false" placeholder="Paste link here...">
    </div>

    <div style="text-align: center;">
        <button onclick="convert()" id="convertBtn" class="convert-btn">Generate Direct Link</button>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <div id="resultArea" class="result-area">
        <div id="resultLabel" class="result-label">Direct Link</div>
        <div id="resultLink" class="result-url"></div>
        <button id="copyBtn" onclick="copy()" class="copy-btn">Copy to Clipboard</button>
    </div>

    <div id="tipText" class="tip"></div>

    <div class="footer">
        POWERED BY MAXEN LAB
    </div>
</div>

<script>
    // 邏輯完全保留你提供的代碼
    const translations = {
        zh: {
            inputLabel: "分享連結",
            subTagline: "輸入分享連結，瞬間獲取直鏈",
            placeholder: "貼上 Google Drive 或 Dropbox 連結...",
            convertBtn: "產生直鏈網址",
            resultLabel: "直鏈網址",
            copyBtn: "複製到剪貼簿",
            copySuccess: "已複製",
            tip: "<strong>使用提示：</strong> 請確保連結權限已設定為「知道連結的任何人」。",
            error: "請檢查連結格式。"
        },
        en: {
            inputLabel: "Share Link",
            subTagline: "Get direct links instantly.",
            placeholder: "Paste Google Drive or Dropbox link...",
            convertBtn: "Generate Direct Link",
            resultLabel: "Direct Link",
            copyBtn: "Copy to Clipboard",
            copySuccess: "Copied",
            tip: "<strong>Tips:</strong> Ensure access is set to 'Anyone with the link'.",
            error: "Invalid link format."
        }
    };

    let currentLang = 'en';

    function setLanguage(lang) {
        currentLang = lang;
        const t = translations[lang];
        document.getElementById('inputLabel').innerText = t.inputLabel;
        document.getElementById('mainTitle').innerText = "DriveLink Converter"; // 保持品牌一致性
        document.getElementById('subTagline').innerText = t.subTagline;
        document.getElementById('urlInput').placeholder = t.placeholder;
        document.getElementById('convertBtn').innerText = t.convertBtn;
        document.getElementById('resultLabel').innerText = t.resultLabel;
        document.getElementById('copyBtn').innerText = t.copyBtn;
        document.getElementById('tipText').innerHTML = t.tip;
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', (lang === 'zh' && btn.innerText === '中文') || (lang === 'en' && btn.innerText === 'English'));
        });
    }

    function convert() {
        const input = document.getElementById('urlInput').value.trim();
        const resultArea = document.getElementById('resultArea');
        const errorMsg = document.getElementById('errorMsg');
        
        errorMsg.innerText = '';
        let directLink = '';

        const gDriveMatch = input.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
        const dbMatch = input.match(/dropbox\.com\/scl\/fi\/([a-zA-Z0-9_-]+)\/([^?]+)\?rlkey=([a-zA-Z0-9_-]+)/);
        const dbOldMatch = input.match(/dropbox\.com\/s\/([a-zA-Z0-9_-]+)\/([^?]+)/);

        if (gDriveMatch) {
            directLink = `https://drive.google.com/uc?export=download&id=${gDriveMatch[1]}`;
        } else if (dbMatch) {
            directLink = `https://dl.dropboxusercontent.com/scl/fi/${dbMatch[1]}/${dbMatch[2]}?rlkey=${dbMatch[3]}&dl=1`;
        } else if (dbOldMatch) {
            directLink = `https://dl.dropboxusercontent.com/s/${dbOldMatch[1]}/${dbOldMatch[2].split('?')[0]}`;
        }

        if (directLink) {
            document.getElementById('resultLink').innerText = directLink;
            resultArea.style.display = 'block';
        } else {
            errorMsg.innerText = translations[currentLang].error;
            resultArea.style.display = 'none';
        }
    }

    function copy() {
        const text = document.getElementById('resultLink').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copyBtn');
            const original = btn.innerText;
            
            btn.innerText = translations[currentLang].copySuccess;
            btn.classList.add('success');
            
            setTimeout(() => {
                btn.innerText = original;
                btn.classList.remove('success');
            }, 1200);
        });
    }

    setLanguage('en');
</script>

</body>
</html>
